
spring:
  application:
    name: cursos

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cursosOnline}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234} 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

server:
  port: 8080



